<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>

<style>
body{
    font-family: Arial;
    padding:20px;
}

input{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 12px;
    cursor:pointer;
}

table{
    border-collapse: collapse;
    width:600px;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

.low-score{
    background:yellow;
}

#stats{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" type="number" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<div id="stats">
Tổng sinh viên: 0 | Điểm trung bình: 0
</div>


<script>

let students = []

const nameInput = document.getElementById("name")
const scoreInput = document.getElementById("score")
const tbody = document.getElementById("tableBody")
const stats = document.getElementById("stats")

function getRank(score){

    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"

}

function addStudent(){

    let name = nameInput.value.trim()
    let score = Number(scoreInput.value)

    if(name === "" || isNaN(score) || score < 0 || score > 10){
        alert("Dữ liệu không hợp lệ")
        return
    }

    students.push({
        name:name,
        score:score
    })

    renderTable()

    nameInput.value = ""
    scoreInput.value = ""
    nameInput.focus()
}

function renderTable(){

    tbody.innerHTML = ""

    let total = 0

    students.forEach((s,index)=>{

        total += s.score

        let tr = document.createElement("tr")

        if(s.score < 5){
            tr.classList.add("low-score")
        }

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${s.name}</td>
        <td>${s.score}</td>
        <td>${getRank(s.score)}</td>
        <td>
            <button data-index="${index}">Xóa</button>
        </td>
        `

        tbody.appendChild(tr)

    })

    let avg = students.length ? (total / students.length).toFixed(2) : 0

    stats.textContent =
    `Tổng sinh viên: ${students.length} | Điểm trung bình: ${avg}`

}

document.getElementById("addBtn").onclick = addStudent


scoreInput.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){
        addStudent()
    }

})


tbody.addEventListener("click",(e)=>{

    if(e.target.tagName === "BUTTON"){

        let index = e.target.dataset.index

        students.splice(index,1)

        renderTable()
    }

})

</script>

</body>
</html>
