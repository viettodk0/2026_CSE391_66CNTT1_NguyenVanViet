<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý điểm sinh viên</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

input,select,button{
    padding:6px;
    margin-right:10px;
}

table{
    border-collapse: collapse;
    width:650px;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    cursor:pointer;
}

.low-score{
    background:yellow;
}

#stats{
    margin-top:10px;
    font-weight:bold;
}

.no-result{
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" type="number" placeholder="Điểm (0-10)">
<button id="addBtn" onclick="addStudent()">Thêm</button>

<br><br>

<input id="search" placeholder="Tìm kiếm sinh viên">

<select id="rankFilter">
<option value="Tất cả">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="scoreHeader">Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<div id="stats">
Tổng sinh viên: 0 | Điểm trung bình: 0
</div>

<script>

let students = []
let filteredStudents = []

let searchKeyword = ""
let selectedRank = "Tất cả"
let sortDirection = null


const nameInput = document.getElementById("name")
const scoreInput = document.getElementById("score")
const tbody = document.getElementById("tableBody")
const stats = document.getElementById("stats")
const scoreHeader = document.getElementById("scoreHeader")



function getRank(score){

    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"

}



function addStudent(){

    let name = nameInput.value.trim()
    let score = Number(scoreInput.value)

    if(name === "" || isNaN(score) || score < 0 || score > 10){
        alert("Dữ liệu không hợp lệ")
        return
    }

    students.push({
        name:name,
        score:score
    })

    nameInput.value = ""
    scoreInput.value = ""
    nameInput.focus()

    applyFilters()
}



function applyFilters(){

    filteredStudents = [...students]



    if(searchKeyword){

        filteredStudents = filteredStudents.filter(s =>
            s.name.toLowerCase().includes(searchKeyword)
        )

    }



    if(selectedRank !== "Tất cả"){

        filteredStudents = filteredStudents.filter(s =>
            getRank(s.score) === selectedRank
        )

    }



    if(sortDirection){

        filteredStudents.sort((a,b)=>{

            if(sortDirection === "asc"){
                return a.score - b.score
            }else{
                return b.score - a.score
            }

        })

    }

    renderTable()
}



function renderTable(){

    tbody.innerHTML = ""



    if(filteredStudents.length === 0){

        tbody.innerHTML =
        `<tr>
            <td colspan="5" class="no-result">Không có kết quả</td>
        </tr>`

        stats.textContent =
        `Tổng sinh viên: ${students.length} | Điểm trung bình: 0`

        return
    }



    let total = 0



    filteredStudents.forEach((s,index)=>{

        total += s.score

        let tr = document.createElement("tr")



        if(s.score < 5){
            tr.classList.add("low-score")
        }



        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${s.name}</td>
        <td>${s.score}</td>
        <td>${getRank(s.score)}</td>
        <td>
            <button data-name="${s.name}" data-score="${s.score}">
            Xóa
            </button>
        </td>
        `

        tbody.appendChild(tr)

    })



    let totalScore = students.reduce((sum,s)=>sum+s.score,0)

    let avg = students.length
        ? (totalScore / students.length).toFixed(2)
        : 0



    stats.textContent =
    `Tổng sinh viên: ${students.length} | Điểm trung bình: ${avg}`



    if(sortDirection === "asc"){
        scoreHeader.innerText = "Điểm ▲"
    }
    else if(sortDirection === "desc"){
        scoreHeader.innerText = "Điểm ▼"
    }
    else{
        scoreHeader.innerText = "Điểm"
    }

}
scoreInput.addEventListener("keypress",(e)=>{

    if(e.key === "Enter"){
        addStudent()
    }

})



document.getElementById("search")
.addEventListener("input",(e)=>{

    searchKeyword = e.target.value.toLowerCase()

    applyFilters()

})



document.getElementById("rankFilter")
.addEventListener("change",(e)=>{

    selectedRank = e.target.value

    applyFilters()

})



scoreHeader.addEventListener("click",()=>{

    if(sortDirection === "asc"){
        sortDirection = "desc"
    }
    else{
        sortDirection = "asc"
    }

    applyFilters()

})



tbody.addEventListener("click",(e)=>{

    if(e.target.tagName === "BUTTON"){

        let name = e.target.dataset.name
        let score = Number(e.target.dataset.score)



        students = students.filter(s =>
            !(s.name === name && s.score === score)
        )

        applyFilters()

    }

})


applyFilters()

</script>

</body>
</html>
